<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
            padding-top: 100px;
        }

        .logo {
            font-size: 60px;
        }

        .title {
            font-size: 28px;
            margin: 20px 0;
        }

        .btn {
            padding: 12px 25px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .login { background: #22c55e; color: white; }
        .register { background: #3b82f6; color: white; }

        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="logo">🤖</div>
<div class="title">Welcome to AI Chatbot</div>

<a href="/login"><button class="btn login">Login</button></a>
<a href="/register"><button class="btn register">Register</button></a>

</body>
</html>
