<!DOCTYPE html>
<html>
<head>
<title>AI Chatbot</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #343541;
    color: white;
}

h2 {
    text-align: center;
    padding: 10px;
}

#chatbox {
    width: 60%;
    margin: auto;
    height: 70vh;
    overflow-y: auto;
    padding: 10px;
}

.user, .bot {
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
    max-width: 70%;
}

.user {
    background: #0b93f6;
    margin-left: auto;
}

.bot {
    background: #444654;
    margin-right: auto;
}

#inputArea {
    position: fixed;
    bottom: 0;
    width: 60%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    padding: 10px;
    background: #40414f;
}

input {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 5px;
    background: #2f303a;
    color: white;
}

button {
    margin-left: 10px;
    padding: 12px;
    background: #19c37d;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

#clearBtn {
    background: red;
}
</style>
</head>

<body>

<h2>AI Chatbot 🤖</h2>
<a href="/logout" style="position:absolute; right:20px; top:20px; color:white;">Logout</a>
<div id="chatbox"></div>

<div id="inputArea">
    <input type="text" id="userInput" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
    <button id="clearBtn" onclick="clearChat()">Clear</button>
</div>

<script>
function sendMessage() {
    let input = document.getElementById("userInput").value;
    if (input === "") return;

    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += "<div class='user'>" + input + "</div>";

    let typing = document.createElement("div");
    typing.className = "bot";
    typing.innerText = "Typing...";
    chatbox.appendChild(typing);

    fetch("/get", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: input})
    })
    .then(res => res.json())
    .then(data => {
        typing.remove();
        chatbox.innerHTML += "<div class='bot'>" + data.reply + "</div>";
        chatbox.scrollTop = chatbox.scrollHeight;
    });

    document.getElementById("userInput").value = "";
}

document.getElementById("userInput")
.addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});

// clear chat
function clearChat() {
    fetch("/clear", {method: "POST"})
    .then(() => {
        document.getElementById("chatbox").innerHTML = "";
    });
}
</script>

</body>
</html>
